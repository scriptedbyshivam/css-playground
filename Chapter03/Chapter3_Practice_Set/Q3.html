        * {
            margin: 0;

        header {
            border: 2px solid white;

            margin: 23px;

   <!-- isme margin collapse ka use ho raha hai toh content ka margin 33 hai or footer ka margin 23 toh content apna

    remember header and footer ki margin kabhi bhi collapse nahi hoti.  -->
